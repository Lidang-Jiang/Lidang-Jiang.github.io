name: Update Impact Factors

on:
  schedule:
    - cron: '0 0 * * 1' # 每周一 UTC 0:00
  workflow_dispatch: # 支持手动触发

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch impact factors from LetPub
        run: node scripts/fetch-impact-factors.mjs

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/impact-factors.json
          git diff --cached --quiet || git commit -m "chore: update impact factors from LetPub"
          git push
